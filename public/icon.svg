<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Globe outline -->
  <circle cx="256" cy="256" r="144" fill="none" stroke="url(#g)" stroke-width="22"/>
  <!-- Vertical ellipse (longitude lines) -->
  <ellipse cx="256" cy="256" rx="72" ry="144" fill="none" stroke="url(#g)" stroke-width="16"/>
  <!-- Horizontal equator line -->
  <line x1="112" y1="256" x2="400" y2="256" stroke="url(#g)" stroke-width="16"/>
  <!-- Upper latitude line -->
  <line x1="131" y1="180" x2="381" y2="180" stroke="url(#g)" stroke-width="12"/>
  <!-- Lower latitude line -->
  <line x1="131" y1="332" x2="381" y2="332" stroke="url(#g)" stroke-width="12"/>
</svg>
